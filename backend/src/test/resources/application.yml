# Test overrides: keep the suite runnable with zero environment setup.
# This file replaces (not merges with) src/main/resources/application.yml
# on the test classpath, so every property SecurityConfig etc. need must be
# repeated here, not just the ones a given test happens to touch.
jwt:
  secret: test-secret-key-32-chars-minimum!!
  expiration-ms: 3600000
  refresh-expiration-ms: 604800000

cors:
  allowed-origins: http://localhost:3000,http://localhost:5173

spring:
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
  # See src/main/resources/application.yml for why this is needed: unlike
  # Kafka, Cassandra/Elasticsearch client beans either connect eagerly or
  # get eagerly health-checked at startup — excluded here too since this
  # file replaces (not merges with) the main one.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.cassandra.CassandraAutoConfiguration
      - org.springframework.boot.autoconfigure.data.cassandra.CassandraDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.cassandra.CassandraRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
