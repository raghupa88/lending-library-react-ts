spring:
  application:
    name: lending-library-api
  profiles:
    active: dev
  jpa:
    # Flyway owns the schema; Hibernate only validates entities against it.
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      # Flyway is the only schema/data writer; never run script initializers.
      mode: never
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:lendinglibrary;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    # Only touched by the (kafka-profile-only) NotificationConsumer; the
    # default host is Mailpit's SMTP port from docker-compose.
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /api/v1/swagger-ui.html
  api-docs:
    path: /api/v1/docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  health:
    # Mail is a best-effort side channel for notifications (see
    # NotificationConsumer) — an SMTP hiccup must not flip readiness/
    # liveness to DOWN and get the pod killed over a non-critical dependency.
    mail:
      enabled: false

jwt:
  # 12-factor: no baked-in secret. The app fails fast at startup when
  # JWT_SECRET is unset — see .env.example / docker-compose.yml.
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

outbox:
  poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:2000}

logging:
  level:
    root: INFO
    com.lendinglibrary: DEBUG

---
# Postgres profile: used by docker-compose and real deployments.
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lendinglibrary}
    username: ${DB_USER:lending}
    password: ${DB_PASSWORD}
  h2:
    console:
      enabled: false

logging:
  level:
    com.lendinglibrary: INFO

---
# Kafka profile: activates the OutboxPublisher and NotificationConsumer
# beans (both @Profile("kafka")) and configures the broker connection.
# Without this profile active, spring-kafka/spring-mail sit on the
# classpath unused — no connection is attempted at startup either way,
# since Kafka/mail clients connect lazily on first send.
spring:
  config:
    activate:
      on-profile: kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: notifications
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
