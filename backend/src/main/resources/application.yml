spring:
  application:
    name: lending-library-api
  profiles:
    active: dev
  # Unlike the Kafka/mail clients below, building a Cassandra CqlSession
  # bean connects synchronously and fails startup if nothing answers on
  # the contact point — so (unlike Kafka) it isn't safe to just leave the
  # starter's auto-configuration enabled and rely on laziness. Excluded by
  # default; the cassandra/elasticsearch profiles below cancel this
  # exclusion. Elasticsearch's REST client itself connects lazily, but its
  # actuator health contributor (wired transitively into every bean that
  # depends on the security filterChain — found the hard way in ADR-025)
  # probes the cluster eagerly, so it gets the same treatment.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.cassandra.CassandraAutoConfiguration
      - org.springframework.boot.autoconfigure.data.cassandra.CassandraDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.cassandra.CassandraRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRepositoriesAutoConfiguration
  jpa:
    # Flyway owns the schema; Hibernate only validates entities against it.
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      # Flyway is the only schema/data writer; never run script initializers.
      mode: never
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:lendinglibrary;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    # Only touched by the (kafka-profile-only) NotificationConsumer; the
    # default host is Mailpit's SMTP port from docker-compose.
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /api/v1/swagger-ui.html
  api-docs:
    path: /api/v1/docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  health:
    # Mail is a best-effort side channel for notifications (see
    # NotificationConsumer) — an SMTP hiccup must not flip readiness/
    # liveness to DOWN and get the pod killed over a non-critical dependency.
    mail:
      enabled: false

jwt:
  # 12-factor: no baked-in secret. The app fails fast at startup when
  # JWT_SECRET is unset — see .env.example / docker-compose.yml.
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

outbox:
  poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:2000}

reservations:
  hold-hours: ${RESERVATION_HOLD_HOURS:72}
  expiry-sweep-interval-ms: ${RESERVATION_EXPIRY_SWEEP_MS:3600000}

late-fees:
  # Capped per-loan at the book's own purchase price — see LoanService.
  per-day-amount: ${LATE_FEE_PER_DAY_AMOUNT:10.00}

subscriptions:
  pause-sweep-interval-ms: ${SUBSCRIPTION_PAUSE_SWEEP_MS:3600000}

logging:
  level:
    root: INFO
    com.lendinglibrary: DEBUG

---
# Postgres profile: used by docker-compose and real deployments.
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lendinglibrary}
    username: ${DB_USER:lending}
    password: ${DB_PASSWORD}
  h2:
    console:
      enabled: false

logging:
  level:
    com.lendinglibrary: INFO

---
# Kafka profile: activates the OutboxPublisher and NotificationConsumer
# beans (both @Profile("kafka")) and configures the broker connection.
# Without this profile active, spring-kafka/spring-mail sit on the
# classpath unused — no connection is attempted at startup either way,
# since Kafka/mail clients connect lazily on first send.
spring:
  config:
    activate:
      on-profile: kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: notifications
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

---
# Cassandra profile: activates ActivityConsumer (@Profile("kafka & cassandra"),
# so it also needs the kafka profile above) and the real Cassandra-backed
# query services (@Profile("cassandra")) that back /activity/me and
# /admin/books/trending. schema-action is deliberately "none" — the
# keyspace/tables are created by the one-shot cassandra-init compose
# service running cql/schema.cql, the same "migrations own the schema, the
# app doesn't auto-DDL it" stance as Flyway/Postgres (ADR-007). Without
# this profile, spring-boot-starter-data-cassandra sits unused on the
# classpath and no connection is attempted (lazy on first read/write, same
# as the Kafka/mail clients above).
spring:
  config:
    activate:
      on-profile: cassandra
  # Clears the *entire* exclude list (not just Cassandra's 3 classes) —
  # correct here because docker-compose always activates cassandra and
  # elasticsearch together in this project's real deployment, so clearing
  # to the same empty list from either profile's document has the same net
  # effect. Tests that activate only one of the two (CassandraSchemaIT,
  # ElasticsearchSearchIT) can't use this shortcut — confirmed by a real CI
  # failure — and instead override with an explicit, surgical list that
  # re-enables just the one technology under test (see ADR-026).
  autoconfigure:
    exclude: []
  cassandra:
    keyspace-name: lending_library
    contact-points: ${CASSANDRA_CONTACT_POINTS:localhost}
    port: ${CASSANDRA_PORT:9042}
    local-datacenter: ${CASSANDRA_DATACENTER:datacenter1}
    schema-action: none

---
# Elasticsearch profile: activates the BookSearchConsumer
# (@Profile("kafka & elasticsearch")) and the real Elasticsearch-backed
# BookSearchQueryService (@Profile("elasticsearch")) that GET /books
# delegates to; without it, BookService falls back to the same Postgres
# LIKE-query search this app always had (see ADR-026). The index itself is
# created by the app on first connect (see BookSearchIndexInitializer) —
# a plain mapping, no migration tool needed the way Cassandra's CQL is.
spring:
  config:
    activate:
      on-profile: elasticsearch
  # Clears the entire exclude list — see the cassandra profile above for
  # why that's correct here but not in a test that isolates just one of
  # the two technologies.
  autoconfigure:
    exclude: []
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
