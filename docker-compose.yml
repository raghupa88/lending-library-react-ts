name: lending-library

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lendinglibrary
      POSTGRES_USER: ${DB_USER:-lending}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lending} -d lendinglibrary"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Pedagogical choice: Zookeeper-mode Kafka, so the classic architecture is
  # actually there to learn (see ADR-008). Compare against `--profile kraft`,
  # a single-node KRaft broker with no Zookeeper at all.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # KRaft alternative (no Zookeeper) — compare with the ZK-mode broker above
  # (see ADR-008). Both bind :9092, so run this standalone, not alongside
  # the default stack: `docker compose --profile kraft up kafka-kraft`.
  kafka-kraft:
    image: confluentinc/cp-kafka:7.6.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-kraft:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-kraft:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka-kraft:29092,CONTROLLER://kafka-kraft:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
    profiles: ["kraft"]

  # Inspect topics/messages at http://localhost:8081
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8081:8080"
    depends_on:
      - kafka

  # Query-first activity feed + counter stats (see ADR-025). cassandra-init
  # is a one-shot service, not a long-running one — Cassandra's official
  # image has no docker-entrypoint-initdb.d convention like Postgres, so
  # the keyspace/tables are created by running cql/schema.cql once via
  # cqlsh against the now-healthy node.
  cassandra:
    image: cassandra:5
    environment:
      CASSANDRA_CLUSTER_NAME: lending-library
    ports:
      - "9042:9042"
    volumes:
      - cassandradata:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  cassandra-init:
    image: cassandra:5
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./backend/src/main/resources/cql:/cql:ro
    entrypoint: ["cqlsh", "cassandra", "-f", "/cql/schema.cql"]
    restart: "no"

  # Book-search index (see ADR-026). Security disabled — this is a local
  # demo/dev stack, not a production cluster; a real deployment would
  # enable it and give Filebeat/Kibana real credentials.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # Inspect the books index / logs shipped by Filebeat at http://localhost:5601
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  # Ships the backend's ECS-JSON stdout logs (logback-spring.xml's `docker`
  # profile) to Elasticsearch, viewable in Kibana's Discover/Logs views —
  # the last piece of ADR-008's "logs as stdout event streams" 12-factor
  # item. Docker-log autodiscovery like this assumes a Linux Docker host
  # where /var/lib/docker/containers is directly readable; Docker Desktop
  # (Mac/Windows) runs Docker inside its own VM, so that path isn't visible
  # to a container the same way — a real caveat of this approach, not
  # something this compose file works around.
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.0
    user: root
    volumes:
      - ./observability/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    command: ["--strict.perms=false"]

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: postgres,docker,kafka,cassandra,elasticsearch
      DB_URL: jdbc:postgresql://postgres:5432/lendinglibrary
      DB_USER: ${DB_USER:-lending}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (32+ chars)}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CASSANDRA_CONTACT_POINTS: cassandra
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 10s
      timeout: 3s
      start_period: 60s
      retries: 10

  frontend:
    build: .
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy

  # Local email sink — notification emails land here (http://localhost:8025)
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pgdata:
  cassandradata:
  esdata:
