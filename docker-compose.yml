name: lending-library

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lendinglibrary
      POSTGRES_USER: ${DB_USER:-lending}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lending} -d lendinglibrary"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: postgres,docker
      DB_URL: jdbc:postgresql://postgres:5432/lendinglibrary
      DB_USER: ${DB_USER:-lending}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (32+ chars)}
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 10s
      timeout: 3s
      start_period: 60s
      retries: 10

  frontend:
    build: .
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy

  # Local email sink — notification emails land here (http://localhost:8025)
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pgdata:
